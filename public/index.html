<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#10b981" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <title>SafeNest — Find Affordable, Safe Housing</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="stylesheet" href="css/styles.css" />
</head>
<body>
  <div class="app">
    <!-- Views -->
    <div id="view-home" class="view active"></div>
    <div id="view-search" class="view"></div>
    <div id="view-map" class="view"></div>
    <div id="view-favorites" class="view"></div>
    <div id="view-detail" class="view"></div>

    <!-- Bottom Tab Bar -->
    <nav class="tab-bar">
      <button class="tab-btn active" data-view="home">
        <span class="tab-icon">🏠</span>Home
      </button>
      <button class="tab-btn" data-view="search">
        <span class="tab-icon">🔍</span>Search
      </button>
      <button class="tab-btn" data-view="map">
        <span class="tab-icon">🗺️</span>Map
      </button>
      <button class="tab-btn" data-view="favorites">
        <span class="tab-icon">❤️</span>Saved
      </button>
    </nav>
  </div>

  <script src="js/data.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
